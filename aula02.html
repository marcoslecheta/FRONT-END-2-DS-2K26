<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula02 - menu hamburguer</title>

    <style>
        .navbar {
            background-color: black;
        }
        .logo {
            color: white;
        }

        .nav-links{

          list-style: none;
          display: flex;
          gap: 20px;
          margin: 0px;
          padding: 0px;

        }

        .nav-links a {

        color: white;
        text-decoration: none;
        font-size: 20px;

        }

        .hamburguer{

        display: none;
        background: none;
        border: none;
        color: white;
        font-size: 24px;
        cursor: pointer;

        }
        
        @media screen and (max-width: 768px) {
            
        .hamburguer{
            display: block;
        }

        .nav-links{

         display: none;
         flex-direction: column;
         position: absolute;
         top: 60px;
         left: 0;
         width: 100%;
         background-color: #333;
         text-align: center;
         padding: 20px 0;
        }

        .nav-links.active {
             
            display: flex;

        }
        
        }

    </style>

</head>
<body>

    <nav class="navbar">
        <div class="logo">Meu site</div>

        <!-- Botão Hamburguer para responsividade -->
        <button class="hamburguer" id="hamburguer-btn">
            &#9776; <!-- Símbolo do ícone de menu -->
        </button>

        <!-- Lista de itens do menu -->
        <ul class="nav-links" id="nav-links">
            <li>
                <a href="#">Início</a>
                <a href="#">Sobre</a>
                <a href="#">Serviços</a>
                <a href="#">Contato</a>
            </li>
        </ul>
    </nav>
    
    <div style="padding: 20px;">
        <h1>Conteúdo da página</h1>
        <p>Redimensione a janela do navegador para ver o menu mudar.</p>
    </div>

    <a href="" style="text-decoration: none;" ></a>
    <script>
         alert("Anjos sem paciencia!!")
    </script>

</body>
</html>
